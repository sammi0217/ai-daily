<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日報</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+TC:wght@400;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #c0c0c0;
  font-family: 'Noto Sans TC', 'Chicago', Geneva, sans-serif;
  font-size: 12px;
  min-height: 100vh;
  cursor: default;
  user-select: none;
}

/* ── MENU BAR ── */
.menubar {
  background: #ffffff;
  border-bottom: 1px solid #000;
  display: flex;
  align-items: center;
  padding: 0 6px;
  height: 20px;
  position: sticky;
  top: 0;
  z-index: 200;
  gap: 0;
}
.menu-item {
  padding: 1px 8px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  line-height: 18px;
  white-space: nowrap;
}
.menu-item:hover { background: #000080; color: #fff; }
.menubar-clock { margin-left: auto; font-size: 11px; padding: 0 8px; }

/* ── DESKTOP ── */
.desktop { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

/* ── BEVEL WINDOW ── */
.window {
  background: #c0c0c0;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  border-right: 2px solid #555555;
  border-bottom: 2px solid #555555;
}

/* ── TITLE BAR ── */
.titlebar {
  height: 22px;
  display: flex;
  align-items: center;
  padding: 0 4px;
  gap: 4px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid #000;
  background: repeating-linear-gradient(
    90deg,
    #000000 0px, #000000 1px,
    #ffffff 1px, #ffffff 3px
  );
}
.titlebar-btn {
  width: 13px; height: 13px;
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #555;
  border-bottom: 1px solid #555;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 9px;
  display: flex; align-items: center; justify-content: center;
  z-index: 1;
}
.titlebar-btn:active { border-color: #555 #fff #fff #555; }
.titlebar-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  background: #c0c0c0;
  padding: 1px 10px;
  font-size: 11px; font-weight: bold;
  white-space: nowrap; z-index: 1;
}

/* ── TOOLBAR ── */
.toolbar {
  border-bottom: 1px solid #000;
  display: flex; align-items: center;
  padding: 4px 6px; gap: 4px;
  background: #c0c0c0; flex-wrap: wrap;
}
.toolbar-btn {
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #555;
  border-bottom: 1px solid #555;
  padding: 2px 10px;
  font-size: 11px; font-weight: bold;
  cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif;
}
.toolbar-btn:active, .toolbar-btn.active {
  border-top: 1px solid #555;
  border-left: 1px solid #555;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
  background: #aaaaaa;
}
.toolbar-sep { width: 1px; height: 18px; background: #888; margin: 0 3px; border-right: 1px solid #fff; }

/* ── LIST VIEW ── */
.list-header {
  display: grid;
  grid-template-columns: 24px 1fr 110px 55px 65px;
  border-bottom: 1px solid #000;
  background: #c0c0c0;
}
.list-header-cell {
  padding: 2px 5px; font-size: 11px; font-weight: bold;
  border-right: 1px solid #888;
  white-space: nowrap; overflow: hidden;
}
.list-header-cell:last-child { border-right: none; }

.article-row {
  display: grid;
  grid-template-columns: 24px 1fr 110px 55px 65px;
  border-bottom: 1px solid #d0d0d0;
  cursor: pointer; align-items: start;
}
.article-row:nth-child(even) { background: rgba(255,255,255,0.3); }
.article-row:hover { background: #b8d4f0; }
.article-row.selected { background: #000080; color: #fff; }

.col-icon { padding: 3px 4px; font-size: 13px; text-align: center; border-right: 1px solid #d0d0d0; }
.col-title { padding: 3px 5px; font-size: 11px; font-weight: bold; border-right: 1px solid #d0d0d0; line-height: 1.4; }
.col-source { padding: 3px 5px; font-size: 10px; border-right: 1px solid #d0d0d0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.col-cat { padding: 3px 5px; font-size: 10px; font-weight: bold; border-right: 1px solid #d0d0d0; }
.col-time { padding: 3px 5px; font-size: 10px; white-space: nowrap; }
.article-row.selected .col-source,
.article-row.selected .col-time { color: #aaaaff; }
.tag-ai { color: #800000; }
.tag-ux { color: #000080; }
.tag-tech { color: #006400; }
.article-row.selected .tag-ai,
.article-row.selected .tag-ux,
.article-row.selected .tag-tech { color: #ffffff; }

/* ── MASTHEAD ── */
.masthead-inner {
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #000;
  background: #fff;
}
.masthead-title {
  font-family: 'VT323', monospace;
  font-size: 48px; line-height: 1;
  letter-spacing: -3px; color: #000;
}
.masthead-sub { font-size: 10px; color: #666; margin-top: 2px; }
.masthead-meta { text-align: right; font-size: 10px; line-height: 1.8; color: #555; }

/* ── DETAIL PANEL ── */
.detail-inner {
  padding: 12px 14px;
  background: #fff;
  border-top: 1px solid #ccc;
}
.detail-headline { font-size: 14px; font-weight: bold; margin-bottom: 8px; line-height: 1.4; }
.detail-deck { font-size: 11px; line-height: 1.8; color: #333; margin-bottom: 10px; }
.detail-meta { font-size: 10px; color: #888; display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
.mac-btn {
  display: inline-block;
  padding: 3px 16px;
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #555;
  border-bottom: 1px solid #555;
  font-size: 11px; font-weight: bold;
  text-decoration: none; color: #000;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
}
.mac-btn:active { border-color: #555 #fff #fff #555; }

/* ── PROGRESS DIALOG ── */
.overlay { position: fixed; inset: 0; z-index: 250; display: none; }
.overlay.visible { display: block; }
.progress-dialog {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 300px; z-index: 300;
  display: none;
}
.progress-dialog.visible { display: block; }
.progress-content { padding: 12px 14px; background: #c0c0c0; border-bottom: 1px solid #000; }
.progress-label { font-size: 11px; margin-bottom: 6px; text-align: center; }
.progress-track {
  background: #fff;
  border-top: 1px solid #555;
  border-left: 1px solid #555;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
  height: 16px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: repeating-linear-gradient(
    90deg, #000080 0px, #000080 8px, #4040b0 8px, #4040b0 16px
  );
  transition: width 0.25s;
}
.progress-status { font-size: 10px; text-align: center; margin-top: 6px; color: #555; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 16px; }
::-webkit-scrollbar-track { background: #c0c0c0; border-left: 1px solid #000; }
::-webkit-scrollbar-thumb {
  background: #c0c0c0;
  border-top: 1px solid #fff; border-left: 1px solid #fff;
  border-right: 1px solid #555; border-bottom: 1px solid #555;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .list-header, .article-row { grid-template-columns: 24px 1fr 80px 45px; }
  .col-time { display: none; }
  .masthead-title { font-size: 36px; }
}
</style>
</head>
<body>

<!-- MENU BAR -->
<div class="menubar">
  <div class="menu-item">🍎</div>
  <div class="menu-item">檔案</div>
  <div class="menu-item">顯示</div>
  <div class="menu-item">說明</div>
  <div class="menubar-clock" id="clock">00:00</div>
</div>

<!-- DESKTOP -->
<div class="desktop">

  <!-- MASTHEAD -->
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-btn">■</div>
      <div class="titlebar-btn">□</div>
      <div class="titlebar-title">AI 日報</div>
    </div>
    <div class="masthead-inner">
      <div>
        <div class="masthead-title">AI 日報</div>
        <div class="masthead-sub">Global AI & UX Intelligence · Daily Digest</div>
      </div>
      <div class="masthead-meta" id="mastheadMeta">載入中...</div>
    </div>
  </div>

  <!-- NEWS WINDOW -->
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-btn">■</div>
      <div class="titlebar-btn">□</div>
      <div class="titlebar-title" id="windowTitle">新聞列表</div>
    </div>

    <div class="toolbar">
      <button class="toolbar-btn active" data-filter="all" onclick="setFilter('all',this)">📋 全部</button>
      <button class="toolbar-btn" data-filter="ai" onclick="setFilter('ai',this)">🤖 AI 動態</button>
      <button class="toolbar-btn" data-filter="ux" onclick="setFilter('ux',this)">🎨 UX 設計</button>
      <button class="toolbar-btn" data-filter="tech" onclick="setFilter('tech',this)">💻 科技</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="loadNews()">↻ 重新整理</button>
      <span style="margin-left:auto; font-size:10px; color:#555;" id="countLabel"></span>
    </div>

    <div class="list-header">
      <div class="list-header-cell"> </div>
      <div class="list-header-cell">標題</div>
      <div class="list-header-cell">來源</div>
      <div class="list-header-cell">分類</div>
      <div class="list-header-cell">時間</div>
    </div>

    <div id="articleList" style="max-height:320px; overflow-y:auto; background:#e8e8e8;">
      <div style="padding:40px; text-align:center; font-size:11px; color:#666;">載入中...</div>
    </div>
  </div>

  <!-- DETAIL WINDOW -->
  <div class="window" id="detailWindow" style="display:none;">
    <div class="titlebar">
      <div class="titlebar-btn" onclick="closeDetail()">■</div>
      <div class="titlebar-btn">□</div>
      <div class="titlebar-title" id="detailWinTitle">文章詳情</div>
    </div>
    <div class="detail-inner">
      <div class="detail-headline" id="detailHeadline"></div>
      <div class="detail-deck" id="detailDeck"></div>
      <div class="detail-meta" id="detailMeta"></div>
      <a class="mac-btn" id="detailLink" href="#" target="_blank">開啟原文 →</a>
      &nbsp;
      <button class="mac-btn" onclick="closeDetail()">關閉</button>
    </div>
  </div>

</div>

<!-- PROGRESS DIALOG -->
<div class="overlay" id="overlay"></div>
<div class="progress-dialog window" id="progressDialog">
  <div class="titlebar">
    <div class="titlebar-title">正在連線到伺服器...</div>
  </div>
  <div class="progress-content">
    <div class="progress-label" id="progressLabel">準備中...</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-status" id="progressStatus">請稍候</div>
  </div>
</div>

<script>
const NEWS_JSON_URL = 'https://raw.githubusercontent.com/sammi0217/ai-daily/main/news.json';

const DEMO = [
  { headline: "OpenAI Releases GPT-4o With Real-Time Vision and Voice", deck: "The latest multimodal model can see, hear, and respond in real-time during video calls, recognizing facial expressions and emotional cues.", source: "TechCrunch", category: "ai", url: "https://techcrunch.com", pubDate: new Date(Date.now()-3600000).toISOString() },
  { headline: "Meta Releases Llama 3.1 405B — Largest Open-Source LLM to Date", deck: "Meta's 405B parameter model is now freely available for commercial use, approaching GPT-4 performance on reasoning tasks.", source: "The Verge", category: "ai", url: "https://theverge.com", pubDate: new Date(Date.now()-7200000).toISOString() },
  { headline: "5 AI Chatbot UX Patterns That Actually Work in 2026", deck: "After studying 120 enterprise deployments, NN/g identifies the most effective patterns for AI interfaces.", source: "Nielsen Norman Group", category: "ux", url: "https://nngroup.com", pubDate: new Date(Date.now()-10800000).toISOString() },
  { headline: "72% of AI Product Failures Stem from UX Problems, Not Technology", deck: "A new report reveals most AI product failures arise from users failing to form accurate mental models.", source: "UX Collective", category: "ux", url: "https://uxdesign.cc", pubDate: new Date(Date.now()-14400000).toISOString() },
  { headline: "Google DeepMind AlphaFold 3 Extends Beyond Proteins to DNA", deck: "The third generation predicts interactions between DNA, RNA, and drug molecules.", source: "MIT Tech Review", category: "ai", url: "https://technologyreview.com", pubDate: new Date(Date.now()-18000000).toISOString() },
  { headline: "The Shift from Command Input to Intent Prediction in Mobile AI", deck: "A new paradigm moves away from typing commands toward systems that predict intent from context.", source: "UX Collective", category: "ux", url: "https://uxdesign.cc", pubDate: new Date(Date.now()-21600000).toISOString() },
  { headline: "Anthropic Claude 3.5 Sonnet Tops Coding Benchmarks Against GPT-4o", deck: "Claude 3.5 Sonnet outperforms GPT-4o on complex multi-file coding tasks across major benchmarks.", source: "The Verge", category: "ai", url: "https://theverge.com", pubDate: new Date(Date.now()-25200000).toISOString() },
  { headline: "Designing AI Onboarding That Builds Accurate Mental Models", deck: "Users who complete structured AI onboarding are 3x less likely to abandon the product within 30 days.", source: "Nielsen Norman Group", category: "ux", url: "https://nngroup.com", pubDate: new Date(Date.now()-28800000).toISOString() }
];

let allNews = [], filtered = [], activeFilter = 'all';

// Clock
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
setInterval(tick, 1000); tick();

function relTime(s) {
  if (!s) return '';
  const d = (Date.now() - new Date(s)) / 1000;
  if (d < 3600) return Math.floor(d/60) + '分前';
  if (d < 86400) return Math.floor(d/3600) + '時前';
  return Math.floor(d/86400) + '天前';
}

function fmtDate(d) {
  const D = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} 星期${D[d.getDay()]}`;
}

// Progress
function showProgress(cb) {
  const pd = document.getElementById('progressDialog');
  const ov = document.getElementById('overlay');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const status = document.getElementById('progressStatus');
  pd.classList.add('visible'); ov.classList.add('visible');
  fill.style.width = '0%';

  const steps = [[15,'連接伺服器...'],[45,'取得新聞資料...'],[75,'整理文章...'],[100,'完成！']];
  let i = 0;
  const iv = setInterval(() => {
    if (i < steps.length) {
      fill.style.width = steps[i][0] + '%';
      label.textContent = steps[i][1];
      status.textContent = steps[i][0] + '%';
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => {
        pd.classList.remove('visible');
        ov.classList.remove('visible');
        cb();
      }, 200);
    }
  }, 280);
}

async function loadNews() {
  showProgress(async () => {
    try {
      const r = await fetch(NEWS_JSON_URL + '?t=' + Date.now());
      const d = await r.json();
      allNews = d.articles || [];
    } catch(e) { allNews = DEMO; }

    const now = new Date();
    document.getElementById('mastheadMeta').innerHTML =
      fmtDate(now) + '<br>共 ' + allNews.length + ' 則報導';
    applyFilter();
  });
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.toolbar-btn[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  filtered = activeFilter === 'all' ? allNews : allNews.filter(n => n.category === activeFilter);
  document.getElementById('countLabel').textContent = '共 ' + filtered.length + ' 則';
  document.getElementById('windowTitle').textContent =
    activeFilter === 'all' ? '全部新聞' : activeFilter === 'ai' ? 'AI 動態' : activeFilter === 'ux' ? 'UX 設計' : '科技';
  renderList();
  closeDetail();
}

function renderList() {
  const el = document.getElementById('articleList');
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:40px;text-align:center;font-size:11px;color:#666">— 沒有資料 —</div>';
    return;
  }
  el.innerHTML = filtered.map((a, i) => `
    <div class="article-row" ondblclick="openUrl('${a.url}')" onclick="selectRow(${i}, this)">
      <div class="col-icon">${a.category === 'ux' ? '🎨' : a.category === 'tech' ? '💻' : '🤖'}</div>
      <div class="col-title">${a.headline}</div>
      <div class="col-source">${a.source}</div>
      <div class="col-cat ${a.category === 'ux' ? 'tag-ux' : a.category === 'tech' ? 'tag-tech' : 'tag-ai'}">${a.category === 'ux' ? 'UX' : a.category === 'tech' ? 'TECH' : 'AI'}</div>
      <div class="col-time">${relTime(a.pubDate)}</div>
    </div>`).join('');
}

function selectRow(i, el) {
  document.querySelectorAll('.article-row').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  const a = filtered[i];
  document.getElementById('detailWindow').style.display = 'block';
  document.getElementById('detailWinTitle').textContent = a.source;
  document.getElementById('detailHeadline').textContent = a.headline;
  document.getElementById('detailDeck').textContent = a.deck || '（無摘要）';
  document.getElementById('detailMeta').innerHTML =
    `<span>來源：${a.source}</span><span>分類：${a.category === 'ux' ? 'UX 設計' : a.category === 'tech' ? '科技' : 'AI 動態'}</span><span>${relTime(a.pubDate)}</span>`;
  document.getElementById('detailLink').href = a.url;
}

function closeDetail() {
  document.getElementById('detailWindow').style.display = 'none';
  document.querySelectorAll('.article-row').forEach(r => r.classList.remove('selected'));
}

function openUrl(url) { window.open(url, '_blank'); }

loadNews();
</script>
</body>
</html>
